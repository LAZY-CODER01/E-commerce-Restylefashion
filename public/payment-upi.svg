<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <rect width="160" height="100" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- UPI Logo -->
  <!-- U -->
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#3A3A3A">U</text>
  <!-- P -->
  <text x="56" y="58" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#3A3A3A">P</text>
  <!-- I -->
  <text x="80" y="58" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#3A3A3A">I</text>
  <!-- Green triangle -->
  <polygon points="92,30 108,60 100,60" fill="#097939"/>
  <!-- Orange triangle -->
  <polygon points="100,30 116,60 108,60" fill="#ED752E"/>
  <!-- NPCI text -->
  <text x="80" y="75" font-family="Arial,sans-serif" font-size="8" font-weight="600" fill="#666" text-anchor="middle" letter-spacing="2">NPCI</text>
</svg>
